x-lightrag-default: &lightrag-default
  build:
    context: .
    dockerfile: Dockerfile
  image: lightrag-local:latest
  env_file:
    - .env
  environment:
    - PORT=9621
    # Override .env URLs to use Docker service names (not localhost)
    - QDRANT_URL=http://qdrant:6333
    - QDRANT_API_KEY=${QDRANT_API_KEY}
    - REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379
    - RERANK_BINDING_HOST=http://reranker:7997/rerank
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - dokploy-network
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 2.5G
      reservations:
        cpus: '0.5'
        memory: 512M

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M

  qdrant:
    image: qdrant/qdrant:v1.15.1
    container_name: qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - dokploy-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1.5G
        reservations:
          cpus: '0.1'
          memory: 256M

  reranker:
    build:
      context: .
      dockerfile: Dockerfile.reranker
    image: reranker-local:latest
    container_name: reranker
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7997/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 768M

  lightrag-ws1:
    <<: *lightrag-default
    container_name: workspace-staging
    environment:
      - WORKSPACE=staging
      - PORT=9621
    ports:
      - "9621:9621"
    volumes:
      - lightrag_ws1_storage:/app/data/rag_storage
      - lightrag_ws1_inputs:/app/data/inputs
      - ./config.ini:/app/config.ini
      - ./.env:/app/.env
    depends_on:
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
      reranker: { condition: service_healthy }

