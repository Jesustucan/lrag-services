services:
  lightrag-ws1:
    container_name: lightrag-ws1
    build:
      context: .
      dockerfile: Dockerfile
    image: lightrag-local:latest
    volumes:
      - lightrag_ws1_storage:/app/data/rag_storage
      - lightrag_ws1_inputs:/app/data/inputs
      - ./config.ini:/app/config.ini
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - WORKSPACE=ws1
      - PORT=9621
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dokploy-network

  lightrag-unireformada:
    container_name: lightrag-unireformada
    build:
